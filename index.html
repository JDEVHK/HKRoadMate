<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fdfbfb">
    <title>HKRoadMate | 香港停車位實時地圖</title>

    <link rel="manifest" href='data:application/manifest+json,{"name":"HKRoadMate","short_name":"RoadMate","display":"standalone","background_color":"#ffffff"}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow: hidden; height: 100vh; width: 100vw;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
            transition: all 0.3s ease;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }

        /* 黑暗模式渲染 */
        body.dark-mode {
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: #f3f4f6;
        }
        body.dark-mode .glass-panel { background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        body.dark-mode .glass-header { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        body.dark-mode .bg-white { background-color: #1f2937 !important; color: #f3f4f6 !important; border-color: rgba(255,255,255,0.05) !important; }
        body.dark-mode .bg-gray-50, body.dark-mode .bg-gray-100 { background-color: #374151 !important; color: #f3f4f6 !important; }
        body.dark-mode .text-gray-800 { color: #f9fafb !important; }
        body.dark-mode .text-gray-600, body.dark-mode .text-gray-500 { color: #d1d5db !important; }
        body.dark-mode .text-gray-400 { color: #9ca3af !important; }
        body.dark-mode .border-gray-100, body.dark-mode .border-gray-200 { border-color: #4b5563 !important; }
        
        body.dark-mode .leaflet-layer {
            filter: invert(90%) hue-rotate(180deg) brightness(110%) contrast(85%) saturate(80%);
        }

        /* 錶位群組圖標 */
        .meter-group-icon {
            background: rgba(255, 255, 255, 0.95); border: 1px solid #e5e7eb; border-radius: 9999px;
            padding: 0.375rem 0.75rem 0.375rem 0.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: center; white-space: nowrap;
        }
        body.dark-mode .meter-group-icon { background: rgba(31, 41, 55, 0.95); border-color: #374151; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        body.dark-mode .meter-group-icon .text-gray-800 { color: #ffffff !important; }

        #map-container { position: absolute; top: 0; left: 0; width: 100%; height: calc(100vh - 85px); z-index: 10; }
        .leaflet-div-icon { background: transparent; border: none; }

        .view-section {
            display: none; height: calc(100vh - 85px); overflow-y: auto; position: absolute;
            top: 0; width: 100%; z-index: 20; padding-top: calc(env(safe-area-inset-top) + 80px);
            padding-bottom: 40px;
        }
        .view-section.active { display: block; }
        #map-view.active { display: block; z-index: 10; padding: 0; }

        .interactive-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .interactive-btn:active { transform: scale(0.95); opacity: 0.8; }
        ::-webkit-scrollbar { display: none; }

        /* Bottom Sheet */
        #bottom-sheet {
            position: fixed; left: 0; right: 0; top: 10vh; height: 90vh;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 2.5rem 2.5rem 0 0; box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
            z-index: 60; transform: translateY(100%); display: flex; flex-direction: column; will-change: transform;
        }
        body.dark-mode #bottom-sheet { background: rgba(30, 41, 59, 0.95); border-top: 1px solid rgba(255,255,255,0.1); }
        #drag-handle-area { padding: 15px 0; touch-action: none; cursor: grab; }
        .drag-bar { width: 50px; height: 6px; background: #d1d5db; border-radius: 10px; margin: 0 auto; }
        body.dark-mode .drag-bar { background: #4b5563; }

        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }

        .settings-subpage { display: none; }
        .settings-subpage.active { display: block; animation: slideInRight 0.3s ease-out forwards; }
        @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-blue-300 transition-colors duration-300">

    <header class="fixed top-0 w-full glass-header z-40 px-5 py-3 pt-[max(env(safe-area-inset-top),0.75rem)] flex justify-between items-center rounded-b-[2rem]">
        <h1 class="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center">
            <i class="fa-solid fa-location-arrow mr-2 text-blue-500"></i>HKRoadMate
        </h1>
        <div id="status-indicator" class="flex items-center text-xs font-bold px-3 py-1.5 rounded-full bg-white shadow-sm border border-gray-100 transition-all duration-300">
            <span class="w-2.5 h-2.5 rounded-full mr-2 shadow-inner bg-yellow-400 animate-pulse" id="status-dot"></span>
            <span id="status-text" class="text-gray-600">連線中...</span>
        </div>
    </header>

    <main id="map-view" class="view-section active">
        <button onclick="ui.openModal('filter-modal')" class="absolute top-[calc(env(safe-area-inset-top)+80px)] right-4 z-30 glass-panel w-12 h-12 rounded-full flex items-center justify-center text-blue-600 shadow-md interactive-btn">
            <i class="fa-solid fa-layer-group text-lg"></i>
        </button>
        <div id="map-container"></div>
    </main>

    <main id="list-view" class="view-section px-5 bg-gradient-to-b from-transparent to-gray-50/50">
        <div class="flex justify-between items-center mb-6 pt-2">
            <h2 class="text-3xl font-black text-gray-800 tracking-tight">我的收藏</h2>
            <button onclick="ui.openModal('create-list-modal')" class="glass-panel px-4 py-2 rounded-2xl text-blue-600 font-bold shadow-sm interactive-btn">
                <i class="fa-solid fa-folder-plus mr-1"></i> 新增
            </button>
        </div>
        <div id="lists-container" class="space-y-6 pb-20"></div>
    </main>

    <main id="settings-view" class="view-section px-5 bg-gradient-to-b from-transparent to-gray-50/50">
        <div id="settings-main" class="settings-subpage active">
            <div class="mb-6 pt-2"><h2 class="text-3xl font-black text-gray-800 tracking-tight">系統設定</h2></div>
            <div class="space-y-4 pb-20">
                <button onclick="settingsCtrl.navigate('ui')" class="w-full glass-panel rounded-[2rem] p-5 shadow-sm flex justify-between items-center interactive-btn">
                    <div class="flex items-center text-gray-800 font-bold text-lg"><i class="fa-solid fa-palette text-blue-500 w-8"></i>介面與外觀 (UI)</div>
                    <i class="fa-solid fa-chevron-right text-gray-400"></i>
                </button>
                <button onclick="settingsCtrl.navigate('data')" class="w-full glass-panel rounded-[2rem] p-5 shadow-sm flex justify-between items-center interactive-btn">
                    <div class="flex items-center text-gray-800 font-bold text-lg"><i class="fa-solid fa-database text-blue-500 w-8"></i>資料與儲存 (Data)</div>
                    <i class="fa-solid fa-chevron-right text-gray-400"></i>
                </button>
                <div class="glass-panel rounded-[2rem] p-5 shadow-sm mt-4">
                    <div class="flex items-center text-gray-800 font-bold text-lg mb-3"><i class="fa-solid fa-map text-blue-500 w-8"></i>地圖引擎狀態</div>
                    <p class="text-xs font-bold text-gray-500 leading-relaxed pl-8">Leaflet.js 動態渲染<br>Canvas 硬體加速啟動中<br>手動觸發車位展開引擎配置完畢</p>
                </div>
            </div>
        </div>

        <div id="settings-ui" class="settings-subpage">
            <div class="mb-6 pt-2 flex items-center">
                <button onclick="settingsCtrl.navigate('main')" class="mr-4 text-blue-500 text-xl interactive-btn p-2"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">介面設定</h2>
            </div>
            <div class="glass-panel rounded-[2rem] p-5 overflow-hidden shadow-sm">
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100">
                    <span class="font-bold text-gray-800 text-lg">黑暗模式 (Dark Mode)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="dark-mode-toggle" class="sr-only peer toggle-checkbox" onchange="settingsCtrl.toggleDark()">
                        <div class="w-14 h-7 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-600 toggle-label"></div>
                    </label>
                </div>
                <p class="text-xs text-gray-400 font-bold mt-4 px-2">開啟黑暗模式將會同時套用特製的深色地圖濾鏡，保護夜間駕駛時的視力。</p>
            </div>
        </div>

        <div id="settings-data" class="settings-subpage">
            <div class="mb-6 pt-2 flex items-center">
                <button onclick="settingsCtrl.navigate('main')" class="mr-4 text-blue-500 text-xl interactive-btn p-2"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">資料設定</h2>
            </div>
            <div class="glass-panel rounded-[2rem] p-5 overflow-hidden shadow-sm">
                <button onclick="settingsCtrl.clearCache()" class="w-full flex justify-between items-center bg-white p-4 rounded-2xl border border-gray-100 interactive-btn text-left">
                    <div>
                        <span class="block font-bold text-red-500 text-lg">清除系統快取</span>
                        <span class="block text-xs text-gray-400 font-bold mt-1">這將清空你的收藏清單與設定</span>
                    </div>
                    <i class="fa-solid fa-trash-can text-red-300 text-xl"></i>
                </button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full glass-header pb-[env(safe-area-inset-bottom)] z-40 rounded-t-[2.5rem]">
        <div class="flex justify-around items-center h-[85px] px-4">
            <button onclick="ui.switchTab('map')" id="tab-map" class="flex flex-col items-center justify-center w-20 text-blue-600 font-black interactive-btn">
                <i class="fa-solid fa-map-location-dot text-2xl mb-1.5 drop-shadow-sm"></i><span class="text-[11px] tracking-wider">地圖</span>
            </button>
            <button onclick="ui.switchTab('list')" id="tab-list" class="flex flex-col items-center justify-center w-20 text-gray-400 font-bold interactive-btn">
                <i class="fa-solid fa-bookmark text-2xl mb-1.5"></i><span class="text-[11px] tracking-wider">收藏</span>
            </button>
            <button onclick="ui.switchTab('settings')" id="tab-settings" class="flex flex-col items-center justify-center w-20 text-gray-400 font-bold interactive-btn">
                <i class="fa-solid fa-gear text-2xl mb-1.5"></i><span class="text-[11px] tracking-wider">設定</span>
            </button>
        </div>
    </nav>

    <div id="bottom-sheet">
        <div id="drag-handle-area"><div class="drag-bar"></div></div>
        <div id="bottom-sheet-content" class="px-6 pb-12 overflow-y-auto flex-1 w-full max-w-lg mx-auto custom-scrollbar"></div>
    </div>

    <div id="filter-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-[70] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel w-[85%] max-w-sm rounded-[2rem] p-6 transform scale-95 transition-transform duration-300 bg-white/95" id="filter-modal-content">
            <h3 class="text-xl font-black mb-5 text-gray-800 flex items-center"><i class="fa-solid fa-filter text-blue-500 mr-2"></i> 顯示篩選</h3>
            <div class="space-y-3 mb-6">
                <button onclick="app.setFilter('all'); ui.closeModal('filter-modal')" id="btn-filter-all" class="filter-option w-full py-4 rounded-2xl bg-blue-500 text-white font-bold interactive-btn shadow-md flex justify-between px-5 items-center transition-all">顯示全部 <i class="fa-solid fa-check"></i></button>
                <button onclick="app.setFilter('carpark'); ui.closeModal('filter-modal')" id="btn-filter-carpark" class="filter-option w-full py-4 rounded-2xl bg-white text-gray-600 font-bold interactive-btn shadow-sm border border-gray-100 flex justify-between px-5 items-center transition-all">僅停車場 <i class="fa-solid fa-car"></i></button>
                <button onclick="app.setFilter('meter'); ui.closeModal('filter-modal')" id="btn-filter-meter" class="filter-option w-full py-4 rounded-2xl bg-white text-gray-600 font-bold interactive-btn shadow-sm border border-gray-100 flex justify-between px-5 items-center transition-all">僅路段咪錶 <i class="fa-solid fa-square-parking"></i></button>
            </div>
            <button onclick="ui.closeModal('filter-modal')" class="w-full py-3.5 rounded-2xl bg-gray-100 text-gray-500 font-bold interactive-btn text-base border border-gray-200">取消</button>
        </div>
    </div>
    
    <div id="save-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-[70] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel w-[90%] max-w-sm rounded-[2rem] p-6 transform scale-95 transition-transform duration-300 bg-white/95" id="save-modal-content">
            <h3 class="text-xl font-black mb-5 text-gray-800 flex items-center"><i class="fa-solid fa-star text-yellow-400 mr-2"></i> 儲存至清單</h3>
            <div id="modal-lists-wrapper" class="space-y-3 max-h-64 overflow-y-auto mb-5 p-1 custom-scrollbar"></div>
            <button onclick="ui.closeModal('save-modal')" class="w-full py-3.5 rounded-2xl bg-gray-100 text-gray-600 font-bold interactive-btn text-base border border-gray-200">取消</button>
        </div>
    </div>

<script>
/**
 * HKRoadMate - Professional Core System (Gemini 3.1 Pro Final Edition)
 */

const STATE = {
    map: null,
    markersGroup: null,
    detailLayer: null, // 管理被點按群組展開後的精細獨立車位點
    allPointsMap: new Map(),
    itemToSave: null,
    currentFilter: 'all',
    clickedGroupId: null // 🌟 核心記錄：當前被使用者點擊展開的群組ID
};

const ICONS = {
    carpark: L.divIcon({
        className: 'custom-icon',
        html: `<div class="bg-white rounded-full p-1 shadow-md border border-gray-100">
                <div class="bg-blue-600 w-9 h-9 rounded-full shadow-inner flex items-center justify-center">
                    <i class="fa-solid fa-car text-white text-lg"></i>
                </div>
               </div>`,
        iconSize: [44, 44], iconAnchor: [22, 22]
    })
};

const settingsCtrl = {
    init() {
        const isDark = localStorage.getItem('hkrm_dark') === 'true';
        if (isDark) {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-mode-toggle').checked = true;
        }
    },
    navigate(pageId) {
        document.querySelectorAll('.settings-subpage').forEach(el => el.classList.remove('active'));
        document.getElementById(`settings-${pageId}`).classList.add('active');
    },
    toggleDark() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('hkrm_dark', isDark);
    },
    clearCache() {
        if(confirm("警告：這將會永久刪除您所有的收藏清單與自訂設定，確定要繼續嗎？")) {
            localStorage.clear();
            location.reload();
        }
    }
};

const bottomSheet = {
    el: document.getElementById('bottom-sheet'),
    content: document.getElementById('bottom-sheet-content'),
    handle: document.getElementById('drag-handle-area'),
    startY: 0, currentY: 0, initialY: 0, isDragging: false,
    peekY: 0, hiddenY: 0, fullY: 0, vh: 0,

    init() {
        this.vh = window.innerHeight;
        this.hiddenY = this.vh * 0.95; 
        this.peekY = this.vh * 0.55;   
        this.fullY = 0;                
        this.el.style.transform = `translateY(${this.hiddenY}px)`;

        this.handle.addEventListener('touchstart', (e) => {
            this.startY = e.touches[0].clientY; this.isDragging = true;
            this.el.style.transition = 'none';
            let matrix = new WebKitCSSMatrix(window.getComputedStyle(this.el).transform);
            this.initialY = matrix.m42;
        }, {passive: true});

        document.addEventListener('touchmove', (e) => {
            if(!this.isDragging) return;
            let newY = this.initialY + (e.touches[0].clientY - this.startY);
            if(newY < 0) newY = 0; 
            this.el.style.transform = `translateY(${newY}px)`;
        }, {passive: true});

        document.addEventListener('touchend', () => {
            if(!this.isDragging) return;
            this.isDragging = false;
            this.el.style.transition = 'transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1)';
            let matrix = new WebKitCSSMatrix(window.getComputedStyle(this.el).transform);
            let finalY = matrix.m42;
            
            if (finalY > this.peekY + 40) this.close();
            else if (finalY < this.peekY - 40) this.snap('full');
            else this.snap('peek');
        });
    },
    snap(state) {
        if(state === 'full') this.el.style.transform = `translateY(${this.fullY}px)`;
        if(state === 'peek') this.el.style.transform = `translateY(${this.peekY}px)`;
        if(state === 'hidden') this.el.style.transform = `translateY(${this.hiddenY}px)`;
    },
    open(html) {
        this.content.innerHTML = html;
        this.el.style.transition = 'transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1)';
        this.snap('peek');
    },
    close() {
        this.snap('hidden');
        STATE.clickedGroupId = null; // 🌟 重設點擊狀態
        app.renderMap();             // 🌟 恢復渲染之前隱藏的群組標籤
        app.updateMeterVisibility(); // 🌟 清除地圖上的獨立細緻車位點
    }
};

const ui = {
    setStatus(msg, statusType) {
        const text = document.getElementById('status-text');
        const dot = document.getElementById('status-dot');
        text.innerText = msg;
        dot.className = 'w-2.5 h-2.5 rounded-full mr-2 shadow-inner ';
        if(statusType === 'loading') dot.className += 'bg-yellow-400 animate-pulse';
        else if(statusType === 'success') dot.className += 'bg-emerald-500';
        else if(statusType === 'warning') dot.className += 'bg-orange-500';
        else dot.className += 'bg-red-500';
    },
    switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById(`${tabId}-view`).classList.add('active');
        ['map', 'list', 'settings'].forEach(id => {
            document.getElementById(`tab-${id}`).className = "flex flex-col items-center justify-center w-20 text-gray-400 font-bold interactive-btn";
        });
        const activeTab = document.getElementById(`tab-${tabId}`);
        activeTab.classList.replace('text-gray-400', 'text-blue-600');
        activeTab.classList.replace('font-bold', 'font-black');
        if (tabId === 'map' && STATE.map) setTimeout(() => STATE.map.invalidateSize(), 100);
        else if (tabId === 'list') database.renderView();
    },
    openModal(id, dataId = null) {
        if (dataId) STATE.itemToSave = STATE.allPointsMap.get(dataId);
        if (id === 'save-modal') {
            document.getElementById('modal-lists-wrapper').innerHTML = database.get().map(l => `
                <button onclick="database.saveItem('${l.id}')" class="w-full text-left px-5 py-4 bg-gray-50 rounded-2xl flex justify-between items-center interactive-btn shadow-sm border border-gray-100 mb-2 hover:bg-white">
                    <span class="font-bold text-gray-800">${l.name}</span> 
                    <i class="fa-solid fa-plus text-blue-600 bg-blue-100 w-7 h-7 flex items-center justify-center rounded-full"></i>
                </button>`).join('');
        }
        document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById(`${id}-content`).classList.remove('scale-95');
    },
    closeModal(id) {
        document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        document.getElementById(`${id}-content`).classList.add('scale-95');
    }
};

const database = {
    get() { return localStorage.getItem('hkrm_v7') ? JSON.parse(localStorage.getItem('hkrm_v7')) : [{ id: 'default', name: '預設收藏', items: [] }]; },
    set(data) { localStorage.setItem('hkrm_v7', JSON.stringify(data)); this.renderView(); },
    createList() {
        const name = document.getElementById('new-list-name').value.trim();
        if (!name) return;
        const data = this.get();
        data.push({ id: 'list_' + Date.now(), name, items: [] });
        this.set(data); document.getElementById('new-list-name').value = ''; ui.closeModal('create-list-modal');
    },
    deleteList(listId) {
        if(listId === 'default') return alert("預設清單無法刪除");
        if(confirm("確定要刪除整個清單嗎？")) this.set(this.get().filter(l => l.id !== listId));
    },
    saveItem(listId) {
        if (!STATE.itemToSave) return;
        const data = this.get();
        const list = data.find(l => l.id === listId);
        if (list) {
            if(!list.items.find(i => i.id === STATE.itemToSave.id)) {
                list.items.push(STATE.itemToSave); this.set(data); ui.closeModal('save-modal');
            } else alert('此地點已在清單中。');
        }
    },
    removeItem(listId, itemId) {
        const data = this.get();
        const list = data.find(l => l.id === listId);
        if(list) { list.items = list.items.filter(i => i.id !== itemId); this.set(data); }
    },
    renderView() {
        const container = document.getElementById('lists-container');
        const lists = this.get();
        container.innerHTML = '';
        if(lists.length === 0) return container.innerHTML = '<div class="text-center text-gray-400 mt-12 font-bold">尚無任何收藏</div>';

        lists.forEach(list => {
            let itemsHtml = list.items.length === 0 ? '<p class="text-sm text-gray-400 italic px-2 py-2">尚未添加任何地點</p>' 
                : list.items.map(item => {
                    const displayItem = STATE.allPointsMap.get(item.id) || item;
                    const availVal = displayItem.available;
                    const availColor = availVal > 0 ? 'text-emerald-500' : (availVal === 0 ? 'text-red-500' : 'text-gray-400');
                    const iconType = displayItem.type === 'carpark' ? '<i class="fa-solid fa-car text-blue-500 bg-blue-50 p-2 rounded-lg mr-3"></i>' : '<i class="fa-solid fa-square-parking text-emerald-500 bg-emerald-50 p-2 rounded-lg mr-3"></i>';
                    return `
                    <div class="bg-white p-3.5 rounded-2xl flex justify-between items-center mb-3 shadow-sm border border-gray-100 interactive-btn" onclick="app.flyTo(${displayItem.lat}, ${displayItem.lng}); app.showDetails('${displayItem.id}')">
                        <div class="flex items-center flex-1 pr-2">
                            ${iconType}
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm leading-tight mb-1 truncate max-w-[160px]">${displayItem.name}</h4>
                                <span class="text-[10px] font-bold text-gray-400">${displayItem.type === 'carpark' ? '停車場' : '路段咪錶'}</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="text-right">
                                <span class="block text-[9px] text-gray-400 font-bold mb-0.5 uppercase tracking-wide">空位</span>
                                <span class="font-black text-lg leading-none ${availColor}">${availVal}</span>
                            </div>
                            <button onclick="event.stopPropagation(); database.removeItem('${list.id}', '${displayItem.id}')" class="text-red-400 bg-red-50/80 w-8 h-8 rounded-full flex items-center justify-center interactive-btn"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </div>`;
                }).join('');

            container.innerHTML += `
            <div class="glass-panel rounded-[2rem] p-5 relative overflow-hidden mb-5">
                <div class="flex justify-between items-center mb-4 pl-1">
                    <h3 class="text-lg font-black text-gray-800">${list.name} <span class="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full ml-1 align-middle">${list.items.length}</span></h3>
                    ${list.id !== 'default' ? `<button onclick="database.deleteList('${list.id}')" class="text-gray-400 p-1"><i class="fa-solid fa-xmark text-lg"></i></button>` : ''}
                </div><div class="space-y-1">${itemsHtml}</div>
            </div>`;
        });
    }
};

const engine = {
    getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    },
    cleanId(str) { return str ? str.toString().replace(/[^a-zA-Z0-9]/g, '').toUpperCase() : ''; },

    async fetchCSV(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP: ${res.status}`);
        const buffer = await res.arrayBuffer();
        let view = new Uint8Array(buffer);
        let text = ((view.length >= 2 && view[0] === 0xFF && view[1] === 0xFE) || (view.length > 4 && view[1] === 0x00 && view[3] === 0x00)) 
            ? new TextDecoder('utf-16le').decode(buffer) : new TextDecoder('utf-8').decode(buffer);
        text = text.replace(/\0/g, ''); 
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        let lines = text.split(/\r?\n/);
        let headerIndex = lines.findIndex(line => line.toLowerCase().match(/(space|region|status|id)/));
        if (headerIndex > 0) lines = lines.slice(headerIndex);
        return new Promise((resolve, reject) => {
            Papa.parse(lines.join('\n').trim(), {
                header: true, skipEmptyLines: true,
                transformHeader: h => h.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_]/g, '').toLowerCase(),
                complete: (results) => resolve(results.data), error: (err) => reject(err)
            });
        });
    },

    async loadCarparks() {
        try {
            const [infoRes, vacRes] = await Promise.all([
                fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=zh_TW'),
                fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=zh_TW')
            ]);
            const infoData = await infoRes.json();
            const vacancyData = await vacRes.json();
            const vacancyMap = new Map();
            
            (vacancyData.results || []).forEach(v => {
                let available = 0, capacity = 0;
                if(v.privateCar && v.privateCar.length > 0) {
                    available = v.privateCar.reduce((sum, pc) => sum + (parseInt(pc.vacancy) || 0), 0);
                    capacity = v.privateCar.reduce((sum, pc) => sum + (parseInt(pc.capacity) || 0), 0);
                }
                vacancyMap.set(v.park_Id, { avail: available < 0 ? 0 : available, total: capacity > 0 ? capacity : '-' });
            });

            (infoData.results || []).forEach(cp => {
                const lat = parseFloat(cp.latitude), lng = parseFloat(cp.longitude);
                if(isNaN(lat) || isNaN(lng)) return;
                const id = 'cp_' + cp.park_Id;
                const vacInfo = vacancyMap.get(cp.park_Id) || { avail: '未知', total: '-' };
                STATE.allPointsMap.set(id, {
                    id, type: 'carpark', name: cp.name || '政府數據停車場',
                    lat, lng, isPublic: true, isIndoor: true, 
                    available: vacInfo.avail, total: vacInfo.total
                });
            });
            return true;
        } catch (e) { throw e; }
    },

    async loadMeters() {
        try {
            const [meterInfo, meterVac] = await Promise.all([
                this.fetchCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv'),
                this.fetchCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv')
            ]);

            const vacancyMap = new Map();
            meterVac.forEach(row => {
                const keys = Object.keys(row);
                const idKey = keys.find(k => k.match(/(parkingspaceid|spaceid|meterid)/));
                const exactStatusKey = keys.find(k => k === 'occupancystatus');
                const statusKey = exactStatusKey || keys.find(k => k.match(/occupancy/)) || keys.find(k => k.match(/status/));
                if (idKey && statusKey && row[idKey]) vacancyMap.set(this.cleanId(row[idKey]), row[statusKey]);
            });

            const streetGroupsMap = new Map();
            meterInfo.forEach(row => {
                const keys = Object.keys(row);
                const latKey = keys.find(k => k.match(/(latitude|lat|緯度)/));
                const lngKey = keys.find(k => k.match(/(longitude|long|lng|經度)/));
                const streetKey = keys.find(k => k.match(/(sectionofstreet_tc|street_tc|address|路段)/));
                const idKey = keys.find(k => k.match(/(parkingspaceid|spaceid|meter)/));

                if (!latKey || !lngKey || !idKey) return;
                const lat = parseFloat(row[latKey]), lng = parseFloat(row[lngKey]);
                if (isNaN(lat) || isNaN(lng) || lat < 22.1 || lat > 22.6 || lng < 113.8 || lng > 114.5) return;

                const cleanSpaceId = this.cleanId(row[idKey]); 
                const sectionName = (streetKey && row[streetKey]) ? row[streetKey].trim() : '未命名路段';
                const status = vacancyMap.get(cleanSpaceId) || 'O';
                const isVacant = (status.trim().toUpperCase() === 'V' || status === '0') ? 1 : 0;

                let streetGroups = streetGroupsMap.get(sectionName);
                if (!streetGroups) { streetGroups = []; streetGroupsMap.set(sectionName, streetGroups); }

                let foundGroup = null;
                for (let group of streetGroups) {
                    // 🌟 修正點 2：將群組半徑直徑範圍收緊至 150 米以內
                    if (engine.getDistance(group.lat, group.lng, lat, lng) <= 150) { foundGroup = group; break; }
                }

                if (!foundGroup) {
                    foundGroup = { id: 'meter_' + sectionName + '_' + streetGroups.length, type: 'meter', name: sectionName, latSum: 0, lngSum: 0, count: 0, available: 0, children: [], lat: lat, lng: lng };
                    streetGroups.push(foundGroup);
                }

                foundGroup.latSum += lat; foundGroup.lngSum += lng; foundGroup.count += 1;
                foundGroup.lat = foundGroup.latSum / foundGroup.count; foundGroup.lng = foundGroup.lngSum / foundGroup.count;
                foundGroup.available += isVacant;
                foundGroup.children.push({ id: cleanSpaceId, lat: lat, lng: lng, isVacant: isVacant });
            });

            streetGroupsMap.forEach(groups => { groups.forEach(g => STATE.allPointsMap.set(g.id, g)); });
            return true;
        } catch (e) { throw e; }
    }
};

const app = {
    async init() {
        settingsCtrl.init(); bottomSheet.init(); this.initMap();
        const results = await Promise.allSettled([ engine.loadCarparks(), engine.loadMeters() ]);
        const carparkSuccess = results[0].status === 'fulfilled';
        const meterSuccess = results[1].status === 'fulfilled';
        if (!carparkSuccess && !meterSuccess) ui.setStatus('系統離線', 'warning');
        else ui.setStatus(`已載入 ${carparkSuccess ? '停車場 ' : ''}${meterSuccess ? '路段咪錶' : ''}`, 'success');
        document.getElementById('status-dot').classList.remove('animate-pulse');
        
        STATE.detailLayer = L.layerGroup().addTo(STATE.map);
        this.renderMap();
        database.renderView();
    },

    initMap() {
        STATE.map = L.map('map-container', { zoomControl: false, tap: true, preferCanvas: true, maxZoom: 22 })
                     .setView([22.3100, 114.1700], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap', maxNativeZoom: 19, maxZoom: 22
        }).addTo(STATE.map);

        STATE.markersGroup = L.layerGroup().addTo(STATE.map); // 改用平鋪渲染以保障群組圖標完整控制力
        STATE.map.on('click', () => { bottomSheet.close(); });
    },

    // 🌟 修正點 1 & 3：主動式精細化車位顯現引擎（僅在特定群組被點擊時，渲染其子車位）
    updateMeterVisibility() {
        STATE.detailLayer.clearLayers();

        // 只有當使用者選中了某個特定咪錶群組時，才展示它內部的細緻車位點
        if (STATE.clickedGroupId) {
            const point = STATE.allPointsMap.get(STATE.clickedGroupId);
            if (point && point.type === 'meter') {
                point.children.forEach(child => {
                    const color = child.isVacant ? '#10b981' : '#ef4444'; 
                    
                    // 🌟 修正點 3：尺寸完美平衡，調大至半徑 7px，並帶有精緻的高亮黃框金邊
                    const circle = L.circleMarker([child.lat, child.lng], {
                        radius: 7, 
                        fillColor: color, 
                        color: '#fbbf24', 
                        weight: 2.5, 
                        fillOpacity: 0.95
                    });
                    
                    circle.bindPopup(`
                        <div class="font-bold text-center text-xs mb-0.5 text-gray-500">車位 ID: ${child.id}</div>
                        <div class="text-center ${child.isVacant ? 'text-emerald-600' : 'text-red-600'} font-black text-base">${child.isVacant ? '✅ 可泊車' : '❌ 已佔用'}</div>
                    `, { closeButton: false, minWidth: 90, offset: [0, -5] });
                    
                    STATE.detailLayer.addLayer(circle);
                });
            }
        }
    },

    setFilter(type) {
        STATE.currentFilter = type;
        ['all', 'carpark', 'meter'].forEach(t => {
            const btn = document.getElementById(`btn-filter-${t}`);
            if(t === type) {
                btn.className = 'filter-option w-full py-4 rounded-2xl bg-blue-500 text-white font-bold interactive-btn shadow-md flex justify-between px-5 items-center transition-all';
                btn.innerHTML = btn.innerHTML.replace('text-gray-400', 'text-white'); 
            } else {
                btn.className = 'filter-option w-full py-4 rounded-2xl bg-white text-gray-600 font-bold interactive-btn shadow-sm border border-gray-100 flex justify-between px-5 items-center transition-all';
            }
        });
        bottomSheet.close(); this.renderMap();
    },

    showDetails(pointId) {
        const point = STATE.allPointsMap.get(pointId);
        if (!point) return;

        STATE.clickedGroupId = pointId; // 鎖定目前點擊的群組ID
        this.renderMap();             // 🌟 立即重繪大地圖，將該群組圖標隱藏
        this.updateMeterVisibility(); // 🌟 精準展開並高亮該群組下的所有獨立車位

        // 平滑聚焦
        const targetZoom = STATE.map.getZoom() < 17 ? 17 : STATE.map.getZoom();
        const projectedCenter = STATE.map.project([point.lat, point.lng], targetZoom);
        projectedCenter.y -= window.innerHeight * 0.12; 
        const targetLatLng = STATE.map.unproject(projectedCenter, targetZoom);
        
        STATE.map.flyTo(targetLatLng, targetZoom, { animate: true, duration: 0.5 });

        let contentHtml = '';
        if (point.type === 'meter') {
            const avail = point.available; const total = point.count;
            contentHtml = `
            <div class="bg-emerald-100 text-emerald-700 text-[10px] font-black px-2.5 py-1 rounded-md inline-block mb-3 uppercase tracking-wider mt-1">Street Meters</div>
            <h3 class="font-black text-2xl mb-4 leading-tight text-gray-800">${point.name}</h3>
            <div class="bg-gray-50 border border-gray-100 rounded-3xl p-6 mb-6 text-center shadow-inner transition-colors duration-300">
                <div class="text-[12px] text-gray-400 font-bold mb-2 uppercase tracking-wide">路段實時可用 / 總錶位</div>
                <div class="font-black text-6xl ${avail > 0 ? 'text-emerald-500' : 'text-red-500'}">
                    ${avail} <span class="text-3xl text-gray-400 font-bold">/ ${total}</span>
                </div>
            </div>
            <p class="text-sm font-bold text-gray-400 text-center mb-6"><i class="fa-solid fa-arrow-up-long mr-2"></i>向上滑動以查看完整頁面</p>
            <div class="flex space-x-3 pb-8">
                <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl text-base font-black shadow-md interactive-btn flex items-center justify-center"><i class="fa-solid fa-location-arrow mr-2"></i>開啟導航</button>
                <button onclick="ui.openModal('save-modal', '${pointId}')" class="w-[60px] bg-white border border-gray-200 text-yellow-400 py-4 rounded-2xl text-xl shadow-sm interactive-btn flex items-center justify-center"><i class="fa-solid fa-star"></i></button>
            </div>`;
        } else {
            const avail = point.available; const total = point.total;
            const availColor = avail > 0 ? 'text-emerald-500' : (avail === 0 ? 'text-red-500' : 'text-gray-500');
            contentHtml = `
            <div class="bg-blue-100 text-blue-700 text-[10px] font-black px-2.5 py-1 rounded-md inline-block mb-3 uppercase tracking-wider mt-1">Carpark</div>
            <h3 class="font-black text-2xl mb-4 leading-tight text-gray-800">${point.name}</h3>
            <div class="bg-gray-50 border border-gray-100 rounded-3xl p-6 mb-6 text-center shadow-inner transition-colors duration-300">
                <div class="text-[12px] text-gray-400 font-bold mb-2 uppercase tracking-wide">實時剩餘空位 / 總數</div>
                <div class="font-black text-6xl ${availColor}">
                    ${avail} <span class="text-3xl text-gray-400 font-bold">/ ${total}</span>
                </div>
            </div>
            <p class="text-sm font-bold text-gray-400 text-center mb-6"><i class="fa-solid fa-arrow-up-long mr-2"></i>向上滑動以查看完整頁面</p>
            <div class="flex space-x-3 pb-8">
                <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl text-base font-black shadow-md interactive-btn flex items-center justify-center"><i class="fa-solid fa-location-arrow mr-2"></i>開啟導航</button>
                <button onclick="ui.openModal('save-modal', '${pointId}')" class="w-[60px] bg-white border border-gray-200 text-yellow-400 py-4 rounded-2xl text-xl shadow-sm interactive-btn flex items-center justify-center"><i class="fa-solid fa-star"></i></button>
            </div>`;
        }
        bottomSheet.open(contentHtml);
    },

    renderMap() {
        STATE.markersGroup.clearLayers();

        STATE.allPointsMap.forEach((point, id) => {
            if(STATE.currentFilter !== 'all' && point.type !== STATE.currentFilter) return;

            // 🌟 修正點 1的核心：如果這個群組正在被點擊查看，大地圖上暫時不繪製它的群組大圖標（改由 detailLayer 呈現子車位）
            if(point.id === STATE.clickedGroupId) return;

            let markerIcon;
            if (point.type === 'meter') {
                const avail = point.available;
                const bgColor = avail > 0 ? 'text-emerald-500' : 'text-red-500';
                const dynamicHtml = `
                    <div class="meter-group-icon transition-colors duration-300">
                        <i class="fa-solid fa-square-parking ${bgColor} mr-1.5 text-base"></i>
                        <span class="font-black text-gray-800 text-sm leading-none">${avail}</span>
                        <span class="text-[11px] text-gray-400 font-bold ml-0.5 leading-none mt-0.5">/${point.count}</span>
                    </div>`;
                markerIcon = L.divIcon({ className: 'bg-transparent border-0', html: dynamicHtml, iconSize: [null, 32], iconAnchor: [35, 16] });
            } else {
                markerIcon = ICONS.carpark;
            }

            const marker = L.marker([point.lat, point.lng], { icon: markerIcon });
            marker.on('click', (e) => { L.DomEvent.stopPropagation(e); this.showDetails(point.id); });
            STATE.markersGroup.addLayer(marker);
        });
    },

    // 🌟 修正點 4：全面重構與修復導航唤醒引擎 (100% 成功率方案)
    navigate(lat, lng) {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) {
            // iOS 自動喚醒系統原生 Apple Maps 
            window.open(`maps://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`, '_blank');
        } else {
            // Android 與其他端喚醒 Google Maps 標準 Directions 導航介面
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
        }
    },

    flyTo(lat, lng) {
        ui.switchTab('map');
        setTimeout(() => STATE.map.flyTo([lat, lng], 17, { duration: 1.0 }), 200);
    }
};

window.ui = ui; window.database = database; window.app = app; window.settingsCtrl = settingsCtrl;
window.onload = () => app.init();
</script>
