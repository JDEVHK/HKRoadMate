<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fdfbfb">
    <title>HKRoadMate | 香港停車位實時地圖</title>

    <link rel="manifest" href='data:application/manifest+json,{"name":"HKRoadMate","short_name":"RoadMate","display":"standalone","background_color":"#ffffff"}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Map_marker_icon_%E2%80%93_Nicolas_Mollet_%E2%80%93_Parking_%E2%80%93_Transportation_%E2%80%93_Classic.png/256px-Map_marker_icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* HKRoadMate Design System */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            overflow: hidden; height: 100vh; width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        #map-container {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100vh - 85px); z-index: 10;
        }

        /* Leaflet Overrides - 移除了彈出視窗外的毛玻璃，提升效能 */
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.98) !important;
            border: 1px solid rgba(240, 240, 240, 1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            border-radius: 1.5rem !important;
        }
        .leaflet-popup-tip { background: rgba(255, 255, 255, 0.98) !important; }
        .leaflet-container a.leaflet-popup-close-button {
            color: #9ca3af; padding: 16px; font-weight: bold; width: 34px; height: 34px;
        }

        /* MarkerCluster Overrides - 徹底移除 blur 以解決模糊方塊與卡頓 */
        .marker-cluster {
            background-clip: padding-box; border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.2) !important; /* 藍色柔和外圈 */
        }
        .marker-cluster div {
            width: 38px; height: 38px; margin: 2px;
            background-color: rgba(255, 255, 255, 0.95) !important;
            border: 2.5px solid #3b82f6; /* 實線取代模糊 */
            color: #1e3a8a !important; font-weight: 800; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 消除 Leaflet Icon 預設背景 */
        .leaflet-div-icon { background: transparent; border: none; }

        .view-section {
            display: none; height: calc(100vh - 85px); overflow-y: auto; position: absolute;
            top: 0; width: 100%; z-index: 20; padding-top: calc(env(safe-area-inset-top) + 80px);
            padding-bottom: 40px;
        }
        .view-section.active { display: block; }
        #map-view.active { display: block; z-index: 10; padding: 0; }

        .interactive-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .interactive-btn:active { transform: scale(0.95); opacity: 0.8; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-blue-300">

    <header class="fixed top-0 w-full glass-header z-40 px-5 py-3 pt-[max(env(safe-area-inset-top),0.75rem)] flex justify-between items-center rounded-b-[2rem]">
        <h1 class="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center">
            <i class="fa-solid fa-location-arrow mr-2 text-blue-500"></i>HKRoadMate
        </h1>
        <div id="status-indicator" class="flex items-center text-xs font-bold px-3 py-1.5 rounded-full bg-white shadow-sm border border-gray-100 transition-all duration-300">
            <span class="w-2.5 h-2.5 rounded-full mr-2 shadow-inner bg-yellow-400 animate-pulse" id="status-dot"></span>
            <span id="status-text" class="text-gray-600">連線中...</span>
        </div>
    </header>

    <main id="map-view" class="view-section active">
        <button onclick="ui.openModal('filter-modal')" class="absolute top-[calc(env(safe-area-inset-top)+80px)] right-4 z-30 glass-panel w-12 h-12 rounded-full flex items-center justify-center text-blue-600 shadow-md interactive-btn border border-white/80">
            <i class="fa-solid fa-layer-group text-lg"></i>
        </button>
        <div id="map-container"></div>
    </main>

    <main id="list-view" class="view-section px-5 bg-gradient-to-b from-transparent to-gray-50/50">
        <div class="flex justify-between items-center mb-6 pt-2">
            <h2 class="text-3xl font-black text-gray-800 tracking-tight">我的收藏</h2>
            <button onclick="ui.openModal('create-list-modal')" class="glass-panel px-4 py-2 rounded-2xl text-blue-600 font-bold shadow-sm interactive-btn">
                <i class="fa-solid fa-folder-plus mr-1"></i> 新增
            </button>
        </div>
        <div id="lists-container" class="space-y-6 pb-20"></div>
    </main>

    <nav class="fixed bottom-0 w-full glass-header pb-[env(safe-area-inset-bottom)] z-40 rounded-t-[2.5rem]">
        <div class="flex justify-around items-center h-[85px] px-8">
            <button onclick="ui.switchTab('map')" id="tab-map" class="flex flex-col items-center justify-center w-20 text-blue-600 font-black interactive-btn">
                <i class="fa-solid fa-map-location-dot text-2xl mb-1.5 drop-shadow-sm"></i>
                <span class="text-[11px] tracking-wider">地圖尋位</span>
            </button>
            <button onclick="ui.switchTab('list')" id="tab-list" class="flex flex-col items-center justify-center w-20 text-gray-400 font-bold interactive-btn">
                <i class="fa-solid fa-bookmark text-2xl mb-1.5"></i>
                <span class="text-[11px] tracking-wider">收藏清單</span>
            </button>
        </div>
    </nav>

    <div id="filter-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel w-[85%] max-w-sm rounded-[2rem] p-6 transform scale-95 transition-transform duration-300 bg-white/95" id="filter-modal-content">
            <h3 class="text-xl font-black mb-5 text-gray-800 flex items-center"><i class="fa-solid fa-filter text-blue-500 mr-2"></i> 顯示篩選</h3>
            <div class="space-y-3 mb-6">
                <button onclick="app.setFilter('all'); ui.closeModal('filter-modal')" id="btn-filter-all" class="filter-option w-full py-4 rounded-2xl bg-blue-500 text-white font-bold interactive-btn shadow-sm flex justify-between px-5 items-center transition-colors">顯示全部 <i class="fa-solid fa-check"></i></button>
                <button onclick="app.setFilter('carpark'); ui.closeModal('filter-modal')" id="btn-filter-carpark" class="filter-option w-full py-4 rounded-2xl bg-white text-gray-600 font-bold interactive-btn shadow-sm border border-gray-100 flex justify-between px-5 items-center transition-colors">僅停車場 <i class="fa-solid fa-car"></i></button>
                <button onclick="app.setFilter('meter'); ui.closeModal('filter-modal')" id="btn-filter-meter" class="filter-option w-full py-4 rounded-2xl bg-white text-gray-600 font-bold interactive-btn shadow-sm border border-gray-100 flex justify-between px-5 items-center transition-colors">僅路段咪錶 <i class="fa-solid fa-square-parking"></i></button>
            </div>
            <button onclick="ui.closeModal('filter-modal')" class="w-full py-3.5 rounded-2xl bg-gray-100 text-gray-500 font-bold interactive-btn text-base border border-gray-200">取消</button>
        </div>
    </div>

    <div id="save-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel w-[90%] max-w-sm rounded-[2rem] p-6 transform scale-95 transition-transform duration-300 bg-white/95" id="save-modal-content">
            <h3 class="text-xl font-black mb-5 text-gray-800 flex items-center"><i class="fa-solid fa-star text-yellow-400 mr-2"></i> 儲存至清單</h3>
            <div id="modal-lists-wrapper" class="space-y-3 max-h-64 overflow-y-auto mb-5 p-1 custom-scrollbar"></div>
            <button onclick="ui.closeModal('save-modal')" class="w-full py-3.5 rounded-2xl bg-gray-100 text-gray-600 font-bold interactive-btn text-base border border-gray-200">取消</button>
        </div>
    </div>

    <div id="create-list-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-panel w-[90%] max-w-sm rounded-[2rem] p-6 transform scale-95 transition-transform duration-300 bg-white/95" id="create-list-modal-content">
            <h3 class="text-xl font-black mb-5 text-gray-800">建立新清單</h3>
            <input type="text" id="new-list-name" placeholder="例如：觀塘工業區" class="w-full bg-white border border-gray-200 px-5 py-4 rounded-2xl mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-gray-700 shadow-inner placeholder-gray-400">
            <div class="flex space-x-3">
                <button onclick="ui.closeModal('create-list-modal')" class="flex-1 py-3.5 rounded-2xl bg-gray-100 text-gray-600 font-bold interactive-btn text-base border border-gray-200">取消</button>
                <button onclick="database.createList()" class="flex-1 py-3.5 rounded-2xl bg-blue-600 text-white font-bold shadow-md interactive-btn text-base">建立</button>
            </div>
        </div>
    </div>

<script>
/**
 * HKRoadMate - Professional Core System (Gemini 3.1 Pro Optimised)
 */

const STATE = {
    map: null,
    markersGroup: null,
    expandedLayer: null, 
    allPointsMap: new Map(),
    itemToSave: null,
    currentFilter: 'all'
};

const ICONS = {
    carpark: L.divIcon({
        className: 'custom-icon',
        html: `<div class="bg-white rounded-full p-1 shadow-md border border-gray-100">
                <div class="bg-blue-600 w-9 h-9 rounded-full shadow-inner flex items-center justify-center">
                    <i class="fa-solid fa-car text-white text-lg"></i>
                </div>
               </div>`,
        iconSize: [44, 44], iconAnchor: [22, 22], popupAnchor: [0, -22]
    })
};

const ui = {
    setStatus(msg, statusType) {
        const text = document.getElementById('status-text');
        const dot = document.getElementById('status-dot');
        text.innerText = msg;
        
        dot.className = 'w-2.5 h-2.5 rounded-full mr-2 shadow-inner ';
        if(statusType === 'loading') dot.className += 'bg-yellow-400 animate-pulse';
        else if(statusType === 'success') dot.className += 'bg-emerald-500';
        else if(statusType === 'warning') dot.className += 'bg-orange-500';
        else dot.className += 'bg-red-500';
    },
    switchTab(tabId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById(`${tabId}-view`).classList.add('active');

        document.getElementById('tab-map').className = "flex flex-col items-center justify-center w-20 text-gray-400 font-bold interactive-btn";
        document.getElementById('tab-list').className = "flex flex-col items-center justify-center w-20 text-gray-400 font-bold interactive-btn";

        const activeTab = document.getElementById(`tab-${tabId}`);
        activeTab.classList.replace('text-gray-400', 'text-blue-600');
        activeTab.classList.replace('font-bold', 'font-black');

        if (tabId === 'map' && STATE.map) {
            setTimeout(() => STATE.map.invalidateSize(), 100);
        } else if (tabId === 'list') {
            database.renderView();
        }
    },
    openModal(id, dataId = null) {
        if (dataId) STATE.itemToSave = STATE.allPointsMap.get(dataId);

        if (id === 'save-modal') {
            const wrapper = document.getElementById('modal-lists-wrapper');
            wrapper.innerHTML = database.get().map(l => `
                <button onclick="database.saveItem('${l.id}')" class="w-full text-left px-5 py-4 bg-gray-50 rounded-2xl flex justify-between items-center interactive-btn shadow-sm border border-gray-100 mb-2 hover:bg-white">
                    <span class="font-bold text-gray-800">${l.name}</span> 
                    <i class="fa-solid fa-plus text-blue-600 bg-blue-100 w-7 h-7 flex items-center justify-center rounded-full"></i>
                </button>`).join('');
        }

        const modal = document.getElementById(id);
        modal.classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById(`${id}-content`).classList.remove('scale-95', 'translate-y-full');
        if (id === 'create-list-modal') setTimeout(() => document.getElementById('new-list-name').focus(), 100);
    },
    closeModal(id) {
        document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        document.getElementById(`${id}-content`).classList.add('scale-95');
    }
};

const database = {
    get() {
        const data = localStorage.getItem('hkRoadMate_V4');
        return data ? JSON.parse(data) : [{ id: 'default', name: '預設收藏', items: [] }];
    },
    set(data) {
        localStorage.setItem('hkRoadMate_V4', JSON.stringify(data));
        this.renderView();
    },
    createList() {
        const input = document.getElementById('new-list-name');
        const name = input.value.trim();
        if (!name) return;
        const data = this.get();
        data.push({ id: 'list_' + Date.now(), name, items: [] });
        this.set(data);
        input.value = '';
        ui.closeModal('create-list-modal');
    },
    deleteList(listId) {
        if(listId === 'default') return alert("預設清單無法刪除");
        if(confirm("確定要刪除整個清單嗎？")) {
            this.set(this.get().filter(l => l.id !== listId));
        }
    },
    saveItem(listId) {
        if (!STATE.itemToSave) return;
        const data = this.get();
        const list = data.find(l => l.id === listId);
        if (list) {
            if(!list.items.find(i => i.id === STATE.itemToSave.id)) {
                list.items.push(STATE.itemToSave);
                this.set(data);
                ui.closeModal('save-modal');
            } else {
                alert('此地點已在清單中。');
            }
        }
    },
    removeItem(listId, itemId) {
        const data = this.get();
        const list = data.find(l => l.id === listId);
        if(list) {
            list.items = list.items.filter(i => i.id !== itemId);
            this.set(data);
        }
    },
    renderView() {
        const container = document.getElementById('lists-container');
        const lists = this.get();
        container.innerHTML = '';

        if(lists.length === 0) return container.innerHTML = '<div class="text-center text-gray-400 mt-12 font-bold">尚無任何收藏</div>';

        lists.forEach(list => {
            let itemsHtml = list.items.length === 0 
                ? '<p class="text-sm text-gray-400 italic px-2 py-2">尚未添加任何地點</p>' 
                : list.items.map(item => {
                    const liveData = STATE.allPointsMap.get(item.id);
                    const displayItem = liveData || item;
                    
                    const availVal = displayItem.available;
                    const availColor = availVal > 0 ? 'text-emerald-500' : (availVal === 0 ? 'text-red-500' : 'text-gray-400');
                    const iconType = displayItem.type === 'carpark' 
                        ? '<i class="fa-solid fa-car text-blue-500 bg-blue-50 p-2 rounded-lg mr-3"></i>'
                        : '<i class="fa-solid fa-square-parking text-emerald-500 bg-emerald-50 p-2 rounded-lg mr-3"></i>';

                    return `
                    <div class="bg-white p-3.5 rounded-2xl flex justify-between items-center mb-3 shadow-sm border border-gray-100 interactive-btn" onclick="app.flyTo(${displayItem.lat}, ${displayItem.lng})">
                        <div class="flex items-center flex-1 pr-2">
                            ${iconType}
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm leading-tight mb-1 truncate max-w-[160px]">${displayItem.name}</h4>
                                <span class="text-[10px] font-bold text-gray-400">${displayItem.type === 'carpark' ? '停車場' : '路段咪錶 (100米內)'}</span>
                            </div>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="text-right">
                                <span class="block text-[9px] text-gray-400 font-bold mb-0.5 uppercase tracking-wide">空位</span>
                                <span class="font-black text-lg leading-none ${availColor}">${availVal}</span>
                            </div>
                            <button onclick="event.stopPropagation(); database.removeItem('${list.id}', '${displayItem.id}')" class="text-red-400 bg-red-50/80 w-8 h-8 rounded-full flex items-center justify-center interactive-btn hover:bg-red-100 transition-colors">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');

            container.innerHTML += `
            <div class="glass-panel rounded-[2rem] p-5 relative overflow-hidden mb-5">
                <div class="flex justify-between items-center mb-4 pl-1">
                    <h3 class="text-lg font-black text-gray-800">${list.name} <span class="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded-full ml-1 align-middle">${list.items.length}</span></h3>
                    ${list.id !== 'default' ? `<button onclick="database.deleteList('${list.id}')" class="text-gray-400 hover:text-red-500 transition-colors p-1"><i class="fa-solid fa-xmark text-lg"></i></button>` : ''}
                </div>
                <div class="space-y-1">${itemsHtml}</div>
            </div>`;
        });
    }
};

const engine = {
    // Haversine 距離計算 (回傳公尺)
    getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    },

    async fetchCSV(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP 錯誤: ${res.status}`);
        const buffer = await res.arrayBuffer();
        let view = new Uint8Array(buffer);
        let text = ((view.length >= 2 && view[0] === 0xFF && view[1] === 0xFE) || (view.length > 4 && view[1] === 0x00 && view[3] === 0x00)) 
            ? new TextDecoder('utf-16le').decode(buffer) : new TextDecoder('utf-8').decode(buffer);
        text = text.replace(/\0/g, ''); 
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

        let lines = text.split(/\r?\n/);
        let headerIndex = lines.findIndex(line => line.toLowerCase().match(/(space|region|status|id)/));
        if (headerIndex > 0) lines = lines.slice(headerIndex);

        return new Promise((resolve, reject) => {
            Papa.parse(lines.join('\n').trim(), {
                header: true, skipEmptyLines: true,
                transformHeader: h => h.replace(/[^a-zA-Z0-9\u4e00-\u9fa5_]/g, '').toLowerCase(),
                complete: (results) => resolve(results.data),
                error: (err) => reject(err)
            });
        });
    },

    async loadCarparks() {
        try {
            const [infoRes, vacRes] = await Promise.all([
                fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info&lang=zh_TW'),
                fetch('https://api.data.gov.hk/v1/carpark-info-vacancy?data=vacancy&lang=zh_TW')
            ]);
            const infoData = await infoRes.json();
            const vacancyData = await vacRes.json();
            const vacancyMap = new Map();
            (vacancyData.results || []).forEach(v => {
                let count = 0;
                if(v.privateCar && v.privateCar.length > 0) count = v.privateCar.reduce((sum, pc) => sum + (parseInt(pc.vacancy) || 0), 0);
                vacancyMap.set(v.park_Id, count < 0 ? 0 : count);
            });

            (infoData.results || []).forEach(cp => {
                const lat = parseFloat(cp.latitude), lng = parseFloat(cp.longitude);
                if(isNaN(lat) || isNaN(lng)) return;
                const id = 'cp_' + cp.park_Id;
                STATE.allPointsMap.set(id, {
                    id, type: 'carpark', name: cp.name || '政府數據停車場',
                    lat, lng, isPublic: true, isIndoor: true, total: '-',
                    available: vacancyMap.has(cp.park_Id) ? vacancyMap.get(cp.park_Id) : '未知'
                });
            });
            return true;
        } catch (e) { throw e; }
    },

    async loadMeters() {
        try {
            const [meterInfo, meterVac] = await Promise.all([
                this.fetchCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/spaceinfo/parkingspaces.csv'),
                this.fetchCSV('https://resource.data.one.gov.hk/td/psiparkingspaces/occupancystatus/occupancystatus.csv')
            ]);

            const vacancyMap = new Map();
            meterVac.forEach(row => {
                const keys = Object.keys(row);
                const idKey = keys.find(k => k.match(/(parkingspaceid|spaceid|meterid)/));
                const statusKey = keys.find(k => k.match(/(occupancy|status|狀態)/));
                if (idKey && statusKey && row[idKey]) vacancyMap.set(row[idKey].toString().trim(), row[statusKey]);
            });

            // 以街道為單位的群組優化 (大幅提升效能)
            const streetGroupsMap = new Map();

            meterInfo.forEach(row => {
                const keys = Object.keys(row);
                const latKey = keys.find(k => k.match(/(latitude|lat|緯度)/));
                const lngKey = keys.find(k => k.match(/(longitude|long|lng|經度)/));
                const streetKey = keys.find(k => k.match(/(sectionofstreet_tc|street_tc|address|路段)/));
                const idKey = keys.find(k => k.match(/(parkingspaceid|spaceid|meter)/));

                if (!latKey || !lngKey || !idKey) return;
                const lat = parseFloat(row[latKey]), lng = parseFloat(row[lngKey]);
                if (isNaN(lat) || isNaN(lng) || lat < 22.1 || lat > 22.6 || lng < 113.8 || lng > 114.5) return;

                const spaceId = row[idKey];
                const sectionName = (streetKey && row[streetKey]) ? row[streetKey].trim() : '未命名路段';
                const status = vacancyMap.get(spaceId.toString().trim()) || 'O';
                const isVacant = (status === 'V' || status.toString().toLowerCase() === 'vacant' || status === '0') ? 1 : 0;

                let streetGroups = streetGroupsMap.get(sectionName);
                if (!streetGroups) {
                    streetGroups = [];
                    streetGroupsMap.set(sectionName, streetGroups);
                }

                // 尋找 100米 內的群組
                let foundGroup = null;
                for (let group of streetGroups) {
                    if (engine.getDistance(group.lat, group.lng, lat, lng) <= 100) {
                        foundGroup = group; break;
                    }
                }

                if (!foundGroup) {
                    foundGroup = { 
                        id: 'meter_' + sectionName + '_' + streetGroups.length, 
                        type: 'meter', name: sectionName, 
                        latSum: 0, lngSum: 0, count: 0, available: 0, children: [], 
                        lat: lat, lng: lng // 初始座標
                    };
                    streetGroups.push(foundGroup);
                }

                // 更新群組數據
                foundGroup.latSum += lat;
                foundGroup.lngSum += lng;
                foundGroup.count += 1;
                foundGroup.lat = foundGroup.latSum / foundGroup.count; // 動態中心點
                foundGroup.lng = foundGroup.lngSum / foundGroup.count;
                foundGroup.available += isVacant;
                foundGroup.children.push({ id: spaceId, lat: lat, lng: lng, isVacant: isVacant });
            });

            // 將所有群組合併進主圖層
            streetGroupsMap.forEach(groups => {
                groups.forEach(g => STATE.allPointsMap.set(g.id, g));
            });
            
            return true;
        } catch (e) { console.error('Meter Error:', e); throw e; }
    }
};

const app = {
    async init() {
        this.initMap();
        const results = await Promise.allSettled([ engine.loadCarparks(), engine.loadMeters() ]);
        const carparkSuccess = results[0].status === 'fulfilled';
        const meterSuccess = results[1].status === 'fulfilled';

        if (!carparkSuccess && !meterSuccess) ui.setStatus('系統離線', 'warning');
        else ui.setStatus(`已載入 ${carparkSuccess ? '停車場 ' : ''}${meterSuccess ? '路段咪錶' : ''}`, 'success');

        document.getElementById('status-dot').classList.remove('animate-pulse');
        this.renderMap();
        database.renderView();
    },

    initMap() {
        // preferCanvas: true -> 硬體加速，解決圖標太多引起的卡頓問題
        // zoomControl: false -> 隱藏預設縮放按鈕，讓出 UI 空間
        // maxZoom: 22 -> 啟用超比例放大，車位不再重疊
        STATE.map = L.map('map-container', { 
            zoomControl: false, 
            tap: true,
            preferCanvas: true,
            maxZoom: 22
        }).setView([22.3100, 114.1700], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap', 
            maxNativeZoom: 19, // 圖資原始最大層級
            maxZoom: 22 // 允許客戶端強制放大
        }).addTo(STATE.map);

        STATE.markersGroup = L.markerClusterGroup({
            maxClusterRadius: 60,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            zoomToBoundsOnClick: true,
            chunkedLoading: true // 分塊加載以保證流暢
        });
        STATE.map.addLayer(STATE.markersGroup);

        STATE.map.on('popupclose', () => {
            if (STATE.expandedLayer) {
                STATE.map.removeLayer(STATE.expandedLayer);
                STATE.expandedLayer = null;
            }
        });
    },

    setFilter(type) {
        STATE.currentFilter = type;
        ['all', 'carpark', 'meter'].forEach(t => {
            const btn = document.getElementById(`btn-filter-${t}`);
            if(t === type) {
                btn.className = 'filter-option w-full py-4 rounded-2xl bg-blue-500 text-white font-bold interactive-btn shadow-md flex justify-between px-5 items-center transition-all';
                btn.innerHTML = btn.innerHTML.replace('text-gray-400', 'text-white'); 
            } else {
                btn.className = 'filter-option w-full py-4 rounded-2xl bg-white text-gray-600 font-bold interactive-btn shadow-sm border border-gray-100 flex justify-between px-5 items-center transition-all';
            }
        });
        if (STATE.expandedLayer) { STATE.map.removeLayer(STATE.expandedLayer); STATE.expandedLayer = null; }
        this.renderMap();
    },

    expandMeters(pointId) {
        STATE.map.closePopup(); // 關閉原本的 Popup

        if (STATE.expandedLayer) STATE.map.removeLayer(STATE.expandedLayer);
        STATE.expandedLayer = L.layerGroup().addTo(STATE.map);

        const point = STATE.allPointsMap.get(pointId);
        if (!point || !point.children) return;

        point.children.forEach(child => {
            const color = child.isVacant ? '#10b981' : '#ef4444'; 
            const circle = L.circleMarker([child.lat, child.lng], {
                radius: 6, fillColor: color, color: '#ffffff', weight: 1.5, fillOpacity: 1
            });
            circle.bindPopup(`
                <div class="font-bold text-center text-sm mb-1 text-gray-800">車位編號: ${child.id}</div>
                <div class="text-center ${child.isVacant ? 'text-emerald-600' : 'text-red-600'} font-black text-lg">${child.isVacant ? '✅ 空置' : '❌ 已佔用'}</div>
            `, { closeButton: false, minWidth: 120 });
            STATE.expandedLayer.addLayer(circle);
        });
        
        if (point.children.length > 0) {
            // 自動放大到最大級別以防止車位重疊
            STATE.map.fitBounds(STATE.expandedLayer.getBounds(), { padding: [60, 60], maxZoom: 22 });
        }
    },

    renderMap() {
        STATE.markersGroup.clearLayers();
        const markers = [];

        STATE.allPointsMap.forEach((point, id) => {
            if(STATE.currentFilter !== 'all' && point.type !== STATE.currentFilter) return;

            const isMeter = point.type === 'meter';
            let markerIcon;

            if (isMeter) {
                const avail = point.available;
                const total = point.count;
                const bgColor = avail > 0 ? 'text-emerald-500' : 'text-red-500';
                
                // 移除原有的 backdrop-blur，改為實色透明背景解決渲染模糊方塊
                const dynamicHtml = `
                    <div class="bg-white/95 rounded-full pl-2 pr-3 py-1.5 shadow-sm border border-gray-200 flex items-center justify-center whitespace-nowrap">
                        <i class="fa-solid fa-square-parking ${bgColor} mr-1.5 text-base"></i>
                        <span class="font-black text-gray-800 text-sm leading-none">${avail}</span>
                        <span class="text-[11px] text-gray-400 font-bold ml-0.5 leading-none mt-0.5">/${total}</span>
                    </div>`;

                markerIcon = L.divIcon({ className: 'bg-transparent border-0', html: dynamicHtml, iconSize: [null, 32], iconAnchor: [35, 16], popupAnchor: [0, -16] });
            } else {
                markerIcon = ICONS.carpark;
            }

            const marker = L.marker([point.lat, point.lng], { icon: markerIcon });
            
            if (isMeter) {
                // 咪錶現在也擁有與停車場相同的完整互動 Popup，並加上了展開按鈕
                const contentHtml = `
                <div class="w-[260px] p-2">
                    <div class="bg-emerald-100 text-emerald-700 text-[10px] font-black px-2.5 py-1 rounded-md inline-block mb-3 uppercase tracking-wider">Street Meters (100m內)</div>
                    <h3 class="font-black text-xl mb-4 leading-tight text-gray-800">${point.name}</h3>
                    
                    <div class="bg-gray-50/80 border border-gray-100 rounded-2xl p-5 mb-4 text-center shadow-inner">
                        <div class="text-[11px] text-gray-400 font-bold mb-2">範圍內可用錶位 / 總數</div>
                        <div class="font-black text-5xl ${point.available > 0 ? 'text-emerald-500' : 'text-red-500'}">
                            ${point.available} <span class="text-2xl text-gray-400 font-bold">/ ${point.count}</span>
                        </div>
                    </div>

                    <button onclick="app.expandMeters('${point.id}')" class="w-full bg-emerald-50 text-emerald-600 border border-emerald-100 py-3 rounded-2xl text-sm font-black shadow-sm interactive-btn mb-3 flex items-center justify-center"><i class="fa-solid fa-eye mr-2"></i>展開 100 米內車位</button>

                    <div class="flex space-x-3">
                        <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-600 text-white py-3.5 rounded-2xl text-sm font-black shadow-md interactive-btn flex items-center justify-center"><i class="fa-solid fa-location-arrow mr-2"></i>導航</button>
                        <button onclick="ui.openModal('save-modal', '${id}')" class="w-[50px] bg-white border border-gray-200 text-yellow-400 py-3.5 rounded-2xl text-lg shadow-sm interactive-btn flex items-center justify-center hover:bg-gray-50"><i class="fa-solid fa-star"></i></button>
                    </div>
                </div>`;
                marker.bindPopup(contentHtml, { closeButton: true, minWidth: 260 });
            } else {
                const avail = point.available;
                const availColor = avail > 0 ? 'text-emerald-500' : (avail === 0 ? 'text-red-500' : 'text-gray-500');
                const contentHtml = `
                <div class="w-[260px] p-2">
                    <div class="bg-blue-100 text-blue-700 text-[10px] font-black px-2.5 py-1 rounded-md inline-block mb-3 uppercase tracking-wider">Carpark</div>
                    <h3 class="font-black text-xl mb-4 leading-tight text-gray-800">${point.name}</h3>
                    
                    <div class="bg-gray-50/80 border border-gray-100 rounded-2xl p-5 mb-6 text-center shadow-inner">
                        <div class="text-[11px] text-gray-400 font-bold mb-2">實時剩餘空位</div>
                        <div class="font-black text-5xl ${availColor}">${avail}</div>
                    </div>

                    <div class="flex space-x-3">
                        <button onclick="app.navigate(${point.lat}, ${point.lng})" class="flex-1 bg-blue-600 text-white py-3.5 rounded-2xl text-sm font-black shadow-md interactive-btn flex items-center justify-center"><i class="fa-solid fa-location-arrow mr-2"></i>導航至此</button>
                        <button onclick="ui.openModal('save-modal', '${id}')" class="w-[50px] bg-white border border-gray-200 text-yellow-400 py-3.5 rounded-2xl text-lg shadow-sm interactive-btn flex items-center justify-center hover:bg-gray-50"><i class="fa-solid fa-star"></i></button>
                    </div>
                </div>`;
                marker.bindPopup(contentHtml, { closeButton: true, minWidth: 260 });
            }
            markers.push(marker);
        });
        STATE.markersGroup.addLayers(markers);
    },

    navigate(lat, lng) {
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIOS) window.open(`http://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`, '_blank');
        else window.open(`http://googleusercontent.com/maps.google.com/3{lat},${lng}`, '_blank');
    },

    flyTo(lat, lng) {
        ui.switchTab('map');
        setTimeout(() => STATE.map.flyTo([lat, lng], 17, { duration: 1.2 }), 200);
    }
};

window.ui = ui;
window.database = database;
window.app = app;
window.onload = () => app.init();
</script>
</body>
</html>
